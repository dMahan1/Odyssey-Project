<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Map Page</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <link rel="stylesheet" href="../static/Pages.css" />
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            crossorigin=""
        />
        <script
            src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            crossorigin=""
        ></script>
        <style></style>
    </head>
    <body>
        <script
            src="https://cdn.socket.io/4.8.3/socket.io.min.js"
            integrity="sha384-kzavj5fiMwLKzzD1f8S7TeoVIEi7uKHvbTA3ueZkrzYq75pNQUiUi6Dy98Q3fxb0"
            crossorigin="anonymous"
        ></script>
        <script src="../static/socket_setup.js" defer></script>
        <script src="../static/Pages.js" defer></script>
        <script src="../static/Map.js" defer></script>

        <div id="whole_page">

            <!-- Search popup -->
            <div id="loc_search_popup_background">
                <div id="loc_search_popup" class="popup">
                    <div id="loc_search_popup_bar">
                        <button id="search_popup_close">&#x2717</button>
                    </div>
                    <label id="loading_label"></label>
                    <template id="loc_results_template">
                        <div class="loc_search_result">
                            <div class="loc_details">
                                <label class="loc_name"> Location Name </label>
                            </div>
                            <div class="loc_result_actions">
                                <button class="loc_result_route" data-id="">&#xFF1E</button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div id="map_top_bar">
                <span id="loc_search">
                    <input
                        type="text"
                        id="loc_search_bar"
                        placeholder="Search..."
                    />
                    <button id="loc_search_btn">
                        <img
                            src="../static/images/magnifying_glass.png"
                            alt="Search icon"
                        />
                    </button>
                </span>
                <button id="make-pin-btn">&#128204</button>
            </div>
            <div id="main_content">
                <div id="side_controls">
                    <button class="side-btn active" id="walk_btn">
                        <img
                            src="../static/images/walking_icon.png"
                            alt="Walk icon"
                        />
                    </button>
                    <button class="side-btn" id="bike_btn">
                        <img
                            src="../static/images/bike_icon.png"
                            alt="Bike icon"
                        />
                    </button>
                    <button class="side-btn" id="car_btn">
                        <img
                            src="../static/images/car_icon.png"
                            alt="Car icon"
                        />
                    </button>
                    <button class="side-btn" id="bus_btn">
                        <img
                            src="../static/images/bus_icon.png"
                            alt="Bus icon"
                        />
                    </button>
                </div>
                <div id="map"></div>
            </div>
            <div id="nav_bar">
                <button class="On" id="map_button">
                    <img
                        class="Map"
                        src="../static/images/Map_icon.png"
                        id="Map_icon"
                        alt="Map icon"
                    />
                </button>
                <button id="calendar_button">
                    <img
                        class="Calendar"
                        src="../static/images/Calendar_icon.png"
                        id="Calendar_icon"
                        alt="Calendar icon"
                    />
                </button>
                <button id="settings_button">
                    <img
                        class="Settings"
                        src="../static/images/Person_icon.png"
                        id="Settings_icon"
                        alt="Settings icon"
                    />
                </button>
            </div>
        </div>
    </body>
</html>
